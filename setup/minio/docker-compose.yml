services:
  minio:
    image: quay.io/minio/minio
    container_name: demo-datalake-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ~/minio_storage:/data
    command: server /data --console-address ":9001"